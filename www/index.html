<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>AI2Work</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0B1120;color:#f1f5f9;font-family:Inter,system-ui,sans-serif;display:flex;align-items:center;justify-content:center;height:100dvh;overflow:hidden}
.loader{text-align:center}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.15);border-top-color:#7c3aed;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
p{font-size:14px;color:#94a3b8}
</style>
</head>
<body>
<div class="loader">
  <div class="spinner"></div>
  <p>AI2Work</p>
</div>
</body>
</html>
